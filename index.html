<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Resultados Kino - Epicentro Chile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root { --azul: #003b8e; --rojo: #e20613; --dorado: #ffd400; --fondo: #f4f6f8; --verde: #28a745; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--fondo); color: #333; }

        /* BANNER SUPERIOR */
        .banner-oficial {
            max-width: 900px; margin: 20px auto; padding: 30px 20px; border-radius: 16px;
            background: linear-gradient(135deg, #ff2f5f 0%, #d50057 100%);
            color: #fff; text-align: center; box-shadow: 0 10px 25px rgba(233, 30, 154, 0.3);
        }
        .banner-top {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            background: rgba(0, 0, 0, 0.2); padding: 8px 20px; border-radius: 50px; margin-bottom: 10px; backdrop-filter: blur(5px);
        }
        .banner-logo { height: 30px; }
        .banner-info { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
        
        .banner-monto { margin: 10px 0; }
        .pozo-label { display: block; font-size: 0.9rem; text-transform: uppercase; opacity: 0.9; margin-bottom: 5px; font-weight: 600; letter-spacing: 1px; }
        .banner-monto .monto { font-size: 3.5rem; font-weight: 800; line-height: 1; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .banner-monto .millones { font-size: 1.5rem; font-weight: 600; opacity: 0.9; display: block; margin-top: 5px; }

        /* CONTROLES ADMIN */
        .admin-controls { display: flex; gap: 10px; justify-content: center; padding: 20px; flex-wrap: wrap; }
        select { padding: 12px 16px; font-size: 15px; border: 1px solid #ddd; border-radius: 8px; min-width: 180px; background: white; cursor: pointer; }
        .btn-copy { padding: 12px 20px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }

        /* RESULTADOS */
        .card { background: #ffffff; max-width: 750px; margin: 20px auto; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card-header { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; text-align: center; }
        .card-header h2 { margin: 0; color: #d50057; font-size: 1.8rem; }

        .juego-bloque { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
        .juego-bloque:last-child { border: none; }
        
        h3 { display: flex; align-items: center; gap: 10px; margin: 0 0 15px 0; color: #444; font-size: 1.1rem; }
        h3 img { height: 35px; width: auto; object-fit: contain; }

        .bolas-fila { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .bola {
            width: 40px; height: 40px; border-radius: 50%; 
            background: radial-gradient(circle at 30% 30%, #ffd700, #ffca28); 
            color: #333; display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.2rem; box-shadow: 0 2px 5px rgba(0,0,0,0.15); border: 2px solid #fff;
        }

        .no-resultados { text-align: center; padding: 30px; background: #fff3f3; border-radius: 8px; border: 1px dashed #ffbbc9; color: #d50057; }

        /* PUBLICIDAD */
        .banner-promo { max-width: 500px; margin: 30px auto; text-align: center; }
        .banner-promo img { max-width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* MODO EMBED */
        body.is-embed .admin-controls, body.is-embed footer { display: none !important; }
        body.is-embed .banner-oficial { margin: 0; border-radius: 0; }
        body.is-embed .card { margin: 10px auto; box-shadow: none; border: 1px solid #eee; }

        @media (max-width: 500px) { .banner-monto .monto { font-size: 2.5rem; } }
    </style>
</head>
<body>

    <section class="banner-oficial">
        <div class="banner-top">
            <img class="banner-logo" src="https://www.epicentrochile.com/wp-content/uploads/2026/02/kino2.png" alt="Kino" />
            <div class="banner-info"><span id="bannerTexto">Cargando...</span></div>
        </div>
        <div class="banner-monto">
            <span class="pozo-label">Pozo a repartir</span>
            <span class="monto" id="bannerMonto">---</span>
            <span class="millones">Millones</span>
        </div>
    </section>

    <section class="admin-controls">
        <select id="selectSorteo"><option value="">Seleccionar Sorteo</option></select>
        <button class="btn-copy" onclick="copiarEmbed()">Copiar Embed</button>
    </section>

    <main id="resultados"></main>

    <section class="banner-promo">
        <a href="http://www.epicentroradio.com/?utm_source=kino_resultados&utm_medium=banner_inferior&utm_campaign=cobertura_nacional" target="_blank">
            <img src="https://primerosenlaquinta.cl/wp-content/uploads/2026/03/ChileybotanasconamarilloenfondorojoparaNegociodeSnacksLogo-ezgif.com-optimize.gif" alt="Escucha Epicentro Radio">
        </a>
    </section>

    <script>
        const SHEET_ID = "1a4XxgaYrixLeSQ0EOnI4thHA-_075uVAxQvvGlGhxQA";
        const URL_JSON = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
        const BASE_URL = "https://rustemah.github.io/kino-resultados/";

        let ALL_DATA = [];
        let ACTUAL = null;

        const IMAGENES = {
            kino: "https://www.epicentrochile.com/wp-content/uploads/2026/02/kino2.png",
            rekino: "https://www.epicentrochile.com/wp-content/uploads/2026/02/rekino.png",
            requete_kino: "https://www.epicentrochile.com/wp-content/uploads/2026/02/requetekino.png",
            premios_especiales: "https://www.epicentrochile.com/wp-content/uploads/2026/02/pe.png",
            chao_jefe_2m: "https://www.epicentrochile.com/wp-content/uploads/2026/02/cj2.png",
            chao_jefe_3m: "https://www.epicentrochile.com/wp-content/uploads/2026/02/cj3.png",
            super_combo: "https://www.epicentrochile.com/wp-content/uploads/2026/02/supermarraqueta.png",
            numero_carton: "https://www.epicentrochile.com/wp-content/uploads/2026/02/pc.png"
        };

        const params = new URLSearchParams(window.location.search);
        const sorteoUrl = params.get('sorteo');
        if(params.get('embed') === '1') document.body.classList.add('is-embed');

        fetch(URL_JSON).then(r => r.text()).then(text => {
            const json = JSON.parse(text.match(/setResponse\(([\s\S]*?)\);?\s*$/)[1]);
            ALL_DATA = json.table.rows.map(row => {
                const v = (idx) => row.c[idx] ? row.c[idx].v : "";
                return {
                    sorteo: v(0).toString(),
                    fecha: formatearFecha(v(1)),
                    monto: v(2) || 0,
                    numCarton: v(10),
                    juegos: {
                        kino: v(3), rekino: v(4), requete_kino: v(5),
                        premios_especiales: v(6), chao_jefe_2m: v(7),
                        chao_jefe_3m: v(8), super_combo: v(9)
                    }
                };
            }).filter(s => s.sorteo !== "").reverse();

            const sel = document.getElementById('selectSorteo');
            sel.innerHTML = ALL_DATA.map(s => `<option value="${s.sorteo}">Sorteo ${s.sorteo}</option>`).join('');

            ACTUAL = sorteoUrl ? ALL_DATA.find(s => s.sorteo === sorteoUrl) : ALL_DATA[0];
            if (ACTUAL) { sel.value = ACTUAL.sorteo; render(); }
        });

        function formatearFecha(f) {
            if(!f) return "";
            if(f.toString().startsWith("Date")) {
                const c = f.match(/\d+/g);
                return `${c[2].padStart(2,'0')}-${(parseInt(c[1])+1).toString().padStart(2,'0')}-${c[0]}`;
            }
            return f;
        }

        // Función clave: Separa los números por líneas (usando ";" o saltos de línea)
        function procesarLineas(texto) {
            if (!texto) return [];
            return texto.toString().split(/[;\n]+/).map(linea => {
                return linea.split(/[,]+/).map(n => n.trim()).filter(n => n !== "");
            }).filter(grupo => grupo.length > 0);
        }

        function render() {
            document.getElementById('bannerTexto').textContent = `Sorteo ${ACTUAL.sorteo} - ${ACTUAL.fecha}`;
            document.getElementById('bannerMonto').textContent = "$" + ACTUAL.monto.toLocaleString("es-CL");
            
            const cont = document.getElementById('resultados');
            let html = `<div class="card"><div class="card-header"><h2>Sorteo N° ${ACTUAL.sorteo}</h2><small>${ACTUAL.fecha}</small></div>`;
            let tieneDatos = false;

            for (const [key, rawValue] of Object.entries(ACTUAL.juegos)) {
                const grupos = procesarLineas(rawValue);
                if(grupos.length) {
                    tieneDatos = true;
                    html += `<div class="juego-bloque"><h3><img src="${IMAGENES[key]}"> ${key.replace('_',' ').toUpperCase()}</h3>`;
                    grupos.forEach((grupo, i) => {
                        const label = grupos.length > 1 ? `<div style="font-size:11px; color:#888; margin-bottom:4px;">Sorteo ${i+1}</div>` : '';
                        html += `${label}<div class="bolas-fila">${grupo.map(n => `<div class="bola">${n}</div>`).join('')}</div>`;
                    });
                    html += `</div>`;
                }
            }

            if(ACTUAL.numCarton) {
                tieneDatos = true;
                html += `<div class="juego-bloque"><h3><img src="${IMAGENES.numero_carton}"> N° DE CARTÓN</h3><div style="font-weight:bold; font-size:1.1rem; color:var(--azul);">${ACTUAL.numCarton}</div></div>`;
            }

            if(!tieneDatos) {
                html += `<div class="no-resultados"><strong>Resultados no disponibles aún.</strong><br>Consulte más tarde.</div>`;
            }

            html += `</div>`;
            cont.innerHTML = html;
        }

        document.getElementById('selectSorteo').onchange = (e) => {
            ACTUAL = ALL_DATA.find(s => s.sorteo === e.target.value);
            render();
        };

        function copiarEmbed() {
            const s = document.getElementById('selectSorteo').value;
            const code = `<iframe src="${BASE_URL}?sorteo=${s}&embed=1" width="100%" height="1300" style="border:0; border-radius:12px; overflow:hidden;" loading="lazy"></iframe>`;
            navigator.clipboard.writeText(code).then(() => alert("Código Embed copiado para el sorteo " + s));
        }
    </script>
</body>
</html>
